name: Build & Release APK

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload debug APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: tetris-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    env:
      RELEASE_TAG: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || format('build-{0}', github.run_number) }}

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build debug APK for release
        run: ./gradlew assembleDebug --stacktrace

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/debug/app-debug.apk \
             app/build/outputs/apk/debug/tetris-${{ env.RELEASE_TAG }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          name: ${{ startsWith(github.ref, 'refs/tags/v') && format('Tetris {0}', github.ref_name) || format('Tetris Build #{0}', github.run_number) }}
          body: |
            ## 📲 Android 스마트폰 설치 방법

            1. 아래 **tetris-${{ env.RELEASE_TAG }}.apk** 파일을 스마트폰으로 다운로드합니다.
            2. 스마트폰에서 **출처를 알 수 없는 앱 설치**를 허용합니다.
               - Android 8.0+: 설정 → 앱 → 특별한 앱 액세스 → 출처를 알 수 없는 앱 설치
               - Android 7.x: 설정 → 보안 → 알 수 없는 소스
            3. 다운로드한 APK 파일을 열어 설치합니다.

            ### 요구 사항
            - Android 7.0 (API 24) 이상
          files: |
            app/build/outputs/apk/debug/tetris-${{ env.RELEASE_TAG }}.apk
          draft: false
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/v') }}
